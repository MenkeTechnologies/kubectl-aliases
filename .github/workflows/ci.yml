name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: kubectl-aliases

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh curl git python3

      - name: Set up zunit + revolver
        run: |
          set -euo pipefail
          mkdir -p .bin
          curl -fsSL -o .bin/revolver https://raw.githubusercontent.com/molovo/revolver/master/revolver
          chmod u+x .bin/revolver
          git clone --depth 1 https://github.com/MenkeTechnologies/zunit
          (cd zunit && ./build.zsh)
          echo "$PWD/zunit" >> "$GITHUB_PATH"
          echo "$PWD/.bin" >> "$GITHUB_PATH"

      - name: Set terminal env
        run: |
          echo "TERM=xterm" >> "$GITHUB_ENV"
          echo "COLUMNS=120" >> "$GITHUB_ENV"
          echo "LINES=40" >> "$GITHUB_ENV"

      - name: Run zunit tests
        run: |
          set -euo pipefail
          cd kubectl-aliases
          zunit --verbose tests/*.zsh

      - name: Verify generator still runs without error
        run: |
          set -euo pipefail
          cd kubectl-aliases
          python3 generate_aliases.py > /tmp/regenerated.aliases
          # Compare counts (allow for upstream generator regen — match floor used by tests).
          regen=$(grep -c '^alias ' /tmp/regenerated.aliases || true)
          shipped=$(grep -c '^alias ' .kubectl_aliases)
          echo "regenerated=$regen shipped=$shipped"
          test "$regen" -ge 700
          test "$shipped" -ge 700
